<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeNAS - Nonton Anime Gratis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Anime<span>NAS</span></div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari anime...">
                <button onclick="searchAnime()"><i class="fas fa-search"></i></button>
            </div>
        </nav>
    </header>

    <main>
        <section id="hero">
            <h1>Update Anime Terbaru</h1>
            <p>Tonton ribuan koleksi anime secara gratis.</p>
        </section>

        <section id="animeList" class="anime-grid">
            </section>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Loading...</h2>
            <div class="video-container">
                <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
